experiment:
  name: "auto" # use %Y%m%d-%H%M%S as default name if "auto" or empty
  output_root: "checkpoints"

runtime:
  seed: 2026
  device: "auto"
  amp: true
  num_workers: 4
  compile_model: false

logger:
  use_wandb: true
  wandb_project: "pv-iqa"
  wandb_entity:
  wandb_mode: "online"
  tags: ["pv", "iqa"]

data:
  root: "datasets/ROI_Data"
  metadata_path: "auto"
  identity_mode: "separate"
  image_size: 224
  batch_size: 32
  eval_batch_size: 64
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  grayscale_to_rgb: true
  pin_memory: true

recognizer:
  backbone: "mobilenetv3_large_100" # backbone name from `timm` library
  pretrained: true
  embedding_dim: 256
  dropout: 0.1
  margin: 0.3
  scale: 30.0
  epochs: 12
  learning_rate: 0.0003
  weight_decay: 0.0001
  warmup_epochs: 1
  train_split: "train"
  val_split: "val"

pseudo_labels:
  split: "all"
  alpha: 0.5
  adaptive_alpha: true
  negative_samples: 512
  gmm_components: 2
  min_positive_count: 4
  eps: 1.0e-6

iqa:
  backbone: "mobilenetv3_large_100" # backbone name from `timm` library
  pretrained: true
  use_waveformer_layer: true
  waveformer_mlp_ratio: 2.0
  epochs: 15
  learning_rate: 0.0002
  weight_decay: 0.00005
  huber_delta: 0.1
  ranking_margin: 0.03
  ranking_weight: 0.3
  min_ranking_gap: 0.05
  train_split: "train"
  val_split: "val"

evaluation:
  split: "test"
  reject_steps: [0.0, 0.05, 0.1, 0.2, 0.3]
  far_targets: [0.01, 0.001, 0.0001]
  max_impostor_pairs: 20000
